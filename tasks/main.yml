---
- name: Ensure config directory
  file:
    state: directory
    path: "{{ vmalert_config_dir }}/templates"
    mode: 0755
    owner: root
    group: root

- name: Collect available bundled templates
  set_fact:
    vmalert_templates_available: >-
      {{
        query('fileglob', role_path + '/files/templates/*.yml')
        | map('basename')
        | list
      }}

- name: Ensure requested include templates exist
  assert:
    that:
      - (vmalert_templates_include | difference(vmalert_templates_available)) | length == 0
    fail_msg: >-
      Unknown vmalert template(s) requested in vmalert_templates_include:
      {{ vmalert_templates_include | difference(vmalert_templates_available) | join(', ') }}.
      Available templates: {{ vmalert_templates_available | join(', ') }}
    quiet: true

- name: Ensure requested exclude templates exist
  assert:
    that:
      - (vmalert_templates_exclude | difference(vmalert_templates_available)) | length == 0
    fail_msg: >-
      Unknown vmalert template(s) requested in vmalert_templates_exclude:
      {{ vmalert_templates_exclude | difference(vmalert_templates_available) | join(', ') }}.
      Available templates: {{ vmalert_templates_available | join(', ') }}
    quiet: true

- name: Build list of bundled templates to deploy
  set_fact:
    vmalert_templates_selected: >-
      {{
        (
          (vmalert_templates_include | length > 0)
          | ternary(vmalert_templates_include, vmalert_templates_available)
        )
        | difference(vmalert_templates_exclude)
        | unique
        | sort
      }}

- name: Ensure templates files
  copy:
    src: "templates/{{ item }}"
    dest: "{{ vmalert_config_dir }}/templates/{{ item }}"
    mode: 0644
    owner: root
    group: root
  loop: "{{ vmalert_templates_selected }}"
  loop_control:
    label: "{{ item }}"
  notify:
    - Reload vmalert

- name: Remove bundled templates that are not selected
  file:
    path: "{{ vmalert_config_dir }}/templates/{{ item }}"
    state: absent
  loop: "{{ vmalert_templates_available | difference(vmalert_templates_selected) }}"
  loop_control:
    label: "{{ item }}"
  notify:
    - Reload vmalert

- name: Ensure additional templates files
  copy:
    content: "{{ item.data | to_nice_yaml(indent=2) }}"
    dest: "{{ vmalert_config_dir }}/templates/{{ item.filename }}"
    mode: 0644
    owner: root
    group: root
  with_items: "{{ vmalert_additional_alerts }}"
  notify:
    - Reload vmalert

- name: Start docker vmalert container
  community.docker.docker_compose_v2:
    state: present
    project_name: vmalert
    definition:
      services:
        vmalert:
          image: "{{ vmalert_docker_image }}"
          container_name: "{{ vmalert_container_name }}"
          ports: "{{ vmalert_ports }}"
          volumes:
            - "{{ vmalert_config_dir }}/templates:/etc/alerts"
          hostname: "{{ vmalert_container_name }}"
          restart: always
          labels: "{{ vmalert_docker_labels }}"
          command: "{{ vmalert_command }}"

      networks:
        default:
          external: true
          name: "{{ vmalert_docker_network_name }}"
  when: not vmalert_swarm_cluster or vm_swarm_manager is undefined

- name: Deploy vmalert to docker swarm
  block:
    - name: Ensure pip installation
      package:
        name: "python3-pip"
        state: present

    - name: Install newer version of pip itself
      pip:
        name: "pip"
        state: latest
        executable: pip3
      when:
        - ansible_distribution == "ubuntu"
        - ansible_distribution_major_version != 24

    - name: Install jsondiff from pip
      pip:
        name: "jsondiff"
        state: present
        executable: pip3
      when:
        - ansible_distribution == "ubuntu"
        - ansible_distribution_major_version != 24

    - name: Ensure jsondiff
      package:
        name: "python3-jsondiff"
        state: present
      when:
        - ansible_distribution == "ubuntu"
        - ansible_distribution_major_version == 24

    - name: Deploy docker vmalert container in swarm
      community.docker.docker_stack:
        state: present
        name: "{{ vmalert_stack_name }}"
        with_registry_auth: yes
        compose:
          - version: '3.5'
            services:
              vmalert:
                image: "{{ vmalert_docker_image }}"
                command: "{{ vmalert_command }}"
                hostname: "{{ vmalert_container_name }}"
                labels: "{{ vmalert_docker_labels }}"
                ports: "{{ vmalert_ports }}"
                volumes:
                  - "{{ vmalert_config_dir }}/templates:/etc/alerts"
                deploy: "{{ vmalert_swarm_deploy }}"
            networks:
              default:
                external:
                  name: "{{ vmalert_docker_network_name }}"
      run_once: True
  delegate_to: "{{ vm_swarm_manager }}"
  when:
    - vmalert_swarm_cluster
    - vm_swarm_manager is defined
